# nginx/default.conf
server {
    listen 80;
    server_name dev.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev.local;
    
    http2 on;
    ssl_certificate /etc/letsencrypt/live/dev.local/localhost+2.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.local/localhost+2-key.pem;

    # Заголовки безопасности
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Статические файлы
    location /static/ {
        alias /server/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        charset utf-8;
    }

    # WebSocket маршруты
    location /ws/ {
        # Попробуйте host.docker.internal или IP хоста
        proxy_pass http://172.19.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Увеличиваем таймауты для WebSocket
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
    }

    # Остальные маршруты
    location / {
        proxy_pass http://172.19.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Для WebSocket fallback
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Настройки для стриминга
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
    }
}

# Переменная для WebSocket connections
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}